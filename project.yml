name: StopPhone
options:
  bundleIdPrefix: com.stopphone
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  StopPhone:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StopPhone
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stopphone.app
        INFOPLIST_FILE: StopPhone/Info.plist
        CODE_SIGN_ENTITLEMENTS: StopPhone/StopPhone.entitlements
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
    dependencies:
      - sdk: FamilyControls.framework
      - sdk: ManagedSettings.framework
